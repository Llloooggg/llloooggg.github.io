<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading…</title>
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header class="hero">
    <div class="container">
      <img id="hero-logo" class="logo" alt="" style="display:none">
      <h1 id="hero-title" class="hero-title-skeleton">&nbsp;</h1>
      <p id="hero-tagline" class="tagline" style="display:none"></p>
      <p id="hero-subtitle" class="subtitle" style="display:none"></p>

      <div id="hero-badges" class="badges" style="display:none"></div>

      <div id="hero-cta" class="cta"></div>
    </div>
  </header>

  <section id="screenshots-section" class="screenshots" style="display:none">
    <div class="container">
      <div id="screenshot-grid" class="screenshot-grid"></div>
    </div>
  </section>

  <section class="readme-content">
    <div class="container">
      <article id="readme-content" class="markdown-body">
        <p class="loading">Loading&hellip;</p>
      </article>
    </div>
  </section>

  <footer>
    <div class="container">
      <p id="footer-links"></p>
      <p class="muted">OneDark theme</p>
    </div>
  </footer>

  <div id="lightbox" class="lightbox" hidden aria-hidden="true" role="dialog" aria-label="Image preview">
    <button type="button" class="lightbox-close" aria-label="Close">&times;</button>
    <img class="lightbox-image" src="" alt="">
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="render.js"></script>
  <script src="lightbox.js"></script>
</body>
</html>
